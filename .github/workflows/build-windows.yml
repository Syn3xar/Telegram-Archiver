name: Build Windows GUI EXE

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".github/workflows/build-windows.yml"
      - "requirements.txt"
      - "scripts/**"
      - "src/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build TelegramAdminGUI.exe
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build executable
        shell: pwsh
        run: .\scripts\build_windows_exe.ps1

      - name: Show executable checksum
        shell: pwsh
        run: Get-FileHash .\dist\TelegramAdminGUI.exe -Algorithm SHA256 | Format-List

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: TelegramAdminGUI-windows
          path: dist/TelegramAdminGUI.exe
          if-no-files-found: error

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/TelegramAdminGUI.exe
